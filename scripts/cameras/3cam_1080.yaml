# @package _global_

# 3-camera configuration for AutoVLA (wide + left + right, no tele).
# Same resolution as 4cam_1080 but drops camera_front_tele_30fov to save
# ~2GB renderer VRAM in colocated mode where rollout and training share
# one GPU.

runtime:
  simulation_config:
    cameras:
    - # Front wide camera
      logical_id: camera_front_wide_120fov
      height: 1080
      width: 1900  # NRE will resize to 1916
      frame_interval_us: 100_000  # 10 Hz
      shutter_duration_us: 30_000
      first_frame_offset_us: -30_000

    - # Left cross camera
      logical_id: camera_cross_left_120fov
      height: 1080
      width: 1900  # NRE will resize to 1916
      frame_interval_us: 100_000
      shutter_duration_us: 30_000
      first_frame_offset_us: -30_000

    - # Right cross camera
      logical_id: camera_cross_right_120fov
      height: 1080
      width: 1900  # NRE will resize to 1916
      frame_interval_us: 100_000
      shutter_duration_us: 30_000
      first_frame_offset_us: -30_000
