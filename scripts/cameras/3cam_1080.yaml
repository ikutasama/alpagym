# @package _global_

# 3-camera configuration for AutoVLA (no tele camera)

runtime:
  simulation_config:
    cameras:
    -
      logical_id: camera_front_wide_120fov
      height: 1080
      width: 1900
      frame_interval_us: 100_000
      shutter_duration_us: 30_000

    -
      logical_id: camera_cross_left_120fov
      height: 1080
      width: 1900
      frame_interval_us: 100_000
      shutter_duration_us: 30_000

    -
      logical_id: camera_cross_right_120fov
      height: 1080
      width: 1900
      frame_interval_us: 100_000
      shutter_duration_us: 30_000
