# @package _global_
# AlpaGym full-node split: AlpaSim owns physical GPUs 4, 5, 6, and 7.

defines:
  nre_cache_size: 16
  physics_cache_size: 16

services:
  renderer:
    environments:
      - OMP_NUM_THREADS=1
      - HOME=/tmp
    replicas_per_container: 1
    gpus: [4, 5, 6, 7]

  driver: null

  physics:
    replicas_per_container: 1
    gpus: [4, 5, 6, 7]

  controller:
    replicas_per_container: 6
    gpus: null

  trafficsim:
    replicas_per_container: 1
    gpus: null

runtime:
  nr_workers: 1
  endpoints:
    # Total capacity per service = nr_gpus x replicas_per_container x n_concurrent_rollouts.
    # REND: 4 x 1 x 3 = 12
    # PHYS: 4 x 1 x 3 = 12
    # CONT: 1 CPU service x 6 x 2 = 12
    renderer:
      n_concurrent_rollouts: 3
    physics:
      n_concurrent_rollouts: 3
      skip: false
    controller:
      n_concurrent_rollouts: 2
      skip: false
    trafficsim:
      skip: true
