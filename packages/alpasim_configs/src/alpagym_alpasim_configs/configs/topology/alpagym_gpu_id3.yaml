# @package _global_
# Partial-node AlpaGym topology: GPU-backed AlpaSim services use physical GPU id 3.

defines:
  nre_cache_size: 16
  physics_cache_size: 16

services:
  renderer:
    environments:
      - OMP_NUM_THREADS=1
      - HOME=/tmp
    replicas_per_container: 1
    gpus: [3]

  driver:
    replicas_per_container: 1
    gpus: [3]

  physics:
    replicas_per_container: 1
    gpus: [3]

  controller:
    replicas_per_container: 2
    gpus: null

  trafficsim:
    replicas_per_container: 1
    gpus: [3]

runtime:
  nr_workers: 1
  endpoints:
    # Total capacity per service = nr_gpus x replicas_per_container x n_concurrent_rollouts.
    # REND: 1 x 1 x 4 = 4
    # DRIV: external_dynamic skips the managed driver in AlpaGym runs.
    # PHYS: 1 x 1 x 4 = 4
    # CONT: 1 CPU service x 2 x 2 = 4
    renderer:
      n_concurrent_rollouts: 4
    driver:
      n_concurrent_rollouts: 4
    physics:
      n_concurrent_rollouts: 4
      skip: false
    controller:
      n_concurrent_rollouts: 2
      skip: false
    trafficsim:
      skip: true
