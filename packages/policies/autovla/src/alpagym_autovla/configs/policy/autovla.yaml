# @package policy
kind: autovla

model:
  kind: autovla
  path: ???
  device: cuda
  dtype: bfloat16
  use_cameras:
    - camera_front_wide_120fov
    - camera_cross_left_120fov
    - camera_cross_right_120fov
  input_size: [320, 512]
  num_context_frames: 4
  num_historical_waypoints: 16
  num_future_waypoints: 10
  step_dt_us: 500000
  bundle_config:
    checkpoint_path: null
    action_start_id: 151665
    action_token_count: 2048
    use_cot: false
    trajectory:
      num_poses: 10
      interval_length: 0.5

inference:
  max_batch_size: 1
  return_trace_for_rl: true
  sampling:
    top_p: 1.0
    top_k: 0
    temperature: 0.9
    num_traj_samples: 1
    num_traj_sets: 1
    max_generation_length: 2048
    force_determinism: false
    diffusion_kwargs:
      noise_level: null
      temperature: null

trajectory_selector: identity
