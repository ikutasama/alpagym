# @package _global_
# AutoVLA smoke test on a single GPU (RTX 5090 32GB).
# Uses colocated mode (policy + rollout on same GPU).

defaults:
  - override /policy: autovla
  - override /topology: local_colocated_1gpu

expected_valid_steps: 8

policy:
  model:
    path: ???
  inference:
    max_batch_size: 1
    sampling:
      temperature: 0.9
      top_p: 1.0
      top_k: 0

dataset:
  scene_ids:
    - clipgt-a309e228-26e1-423e-a44c-cb00aa7378cb

alpasim:
  wizard_args:
    control_timestep_us: 200_000
    force_gt_duration_us: 1_600_000
    n_sim_steps: 24
    extra_overrides: "runtime.simulation_config.pose_reporting_interval_us=100000"

cosmos:
  mode: colocated
  launch:
    policy_replicas: 1
    rollout_replicas: 1
  policy:
    parallelism:
      dp_shard_size: 1
  train:
    max_num_steps: 1
    num_epochs: 1
    train_batch_per_replica: 1
    optm_lr: 1.0e-5
    optm_warmup_steps: 1
    ckpt:
      enable_checkpoint: true
      export_safetensors: false
    train_policy:
      mini_batch: 1
      grpo_optimization_iterations: 1
      kl_beta: 0.04
  rollout:
    n_generation: 2
    batch_size: 1
    prefetch_rollout: false
  logging:
    experiment_name: autovla_local_1gpu_smoke
