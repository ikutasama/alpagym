[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name = "alpagym-alpamayo-r1"
version = "0.1.0"
dependencies = ["alpagym-runtime", "alpamayo-r1", "alpamayo1-x-rl"]

[project.entry-points."alpagym.policy_bundles"]
alpamayo_r1 = "alpagym_alpamayo_r1.bundle:get_bundle"

[project.entry-points."alpagym.configs"]
alpamayo_r1 = "alpagym_alpamayo_r1.configs"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"alpagym_alpamayo_r1.configs" = ["**/*.yaml"]

[tool.uv.sources]
alpamayo-r1 = { git = "https://github.com/NVlabs/alpamayo.git", rev = "4cda35d22bb257f0936ac272397627b9309ca211" }
# TODO: switch back to main once the ExpertModel upstream MR
# (NVlabs/alpamayo-recipes#thomast/expert_wrapper_file) merges; bump
# the rev intentionally rather than tracking a moving branch.
alpamayo1-x-rl = { git = "https://github.com/NVlabs/alpamayo-recipes.git", subdirectory = "recipes/alpamayo1_x_rl", rev = "4bc76779739461a028ee8bb9008bc4082a3328dd" }
