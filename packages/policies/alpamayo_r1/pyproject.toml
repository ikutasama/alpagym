[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name = "alpagym-alpamayo-r1"
version = "0.1.0"
dependencies = ["alpagym-runtime", "alpamayo1-x-rl"]

[project.entry-points."alpagym.policy_bundles"]
alpamayo_r1 = "alpagym_alpamayo_r1.bundle:get_bundle"

[project.entry-points."alpagym.configs"]
alpamayo_r1 = "alpagym_alpamayo_r1.configs"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"alpagym_alpamayo_r1.configs" = ["**/*.yaml"]

[tool.uv.sources]
alpamayo1-x-rl = { git = "https://github.com/NVlabs/alpamayo-recipes.git", subdirectory = "recipes/alpamayo1_x_rl", rev = "1d99fc50370c96637157455da386323a44663c9d" }
