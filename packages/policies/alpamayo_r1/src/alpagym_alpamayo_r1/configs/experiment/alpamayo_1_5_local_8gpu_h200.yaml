# Single-node 8x H200 closed-loop RL. GPU 0 trains, GPUs 1-3 run policy
# rollouts, and GPUs 4-7 run AlpaSim rendering/physics.
defaults:
  - override /policy: alpamayo_r1
  - override /topology: local_disaggregated_8gpu
  - override /reward: progress_safety

expected_valid_steps: 22

policy:
  model:
    path: ???
  inference:
    # Six generations are spread over three rollout replicas: two per GPU.
    max_batch_size: 2
    sampling:
      diffusion_kwargs:
        inference_step: 4
        noise_level: 0.2

dataset:
  scene_ids:
    - clipgt-a309e228-26e1-423e-a44c-cb00aa7378cb

alpasim:
  wizard_args:
    control_timestep_us: 200_000
    force_gt_duration_us: 1_600_000
    n_sim_steps: 30
    extra_overrides: "+cameras=4cam_1080 runtime.simulation_config.pose_reporting_interval_us=100000"

cosmos:
  mode: disaggregated
  launch:
    policy_replicas: 1
    rollout_replicas: 3
  policy:
    parallelism:
      dp_shard_size: 1
  train:
    max_num_steps: 50
    num_epochs: 10
    train_batch_per_replica: 6
    optm_lr: 1.0e-4
    optm_warmup_steps: 1
    ckpt:
      enable_checkpoint: true
      save_freq: 5
      export_safetensors: true
      max_keep: 3
    train_policy:
      mini_batch: 1
      grpo_optimization_iterations: 1
      kl_beta: 0.0
  rollout:
    n_generation: 6
    batch_size: 1
    prefetch_rollout: false
  logging:
    experiment_name: alpamayo_1_5_local_8gpu_h200
