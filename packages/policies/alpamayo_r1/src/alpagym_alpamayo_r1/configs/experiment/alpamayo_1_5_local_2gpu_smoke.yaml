defaults:
  - override /policy: alpamayo_r1
  - override /topology: local_disaggregated_2gpu

expected_valid_steps: 22

policy:
  model:
    path: ???
  inference:
    max_batch_size: 1
    sampling:
      diffusion_kwargs:
        inference_step: 4
        noise_level: 0.2

dataset:
  scene_ids:
    - clipgt-a309e228-26e1-423e-a44c-cb00aa7378cb

alpasim:
  wizard_args:
    control_timestep_us: 200_000
    force_gt_duration_us: 1_600_000
    n_sim_steps: 30
    extra_overrides: "+cameras=4cam_1080 runtime.simulation_config.pose_reporting_interval_us=100000"

cosmos:
  mode: disaggregated
  launch:
    policy_replicas: 1
    rollout_replicas: 1
  policy:
    parallelism:
      dp_shard_size: 1
  train:
    max_num_steps: 1
    num_epochs: 1
    train_batch_per_replica: 1
    optm_lr: 1.0e-4
    optm_warmup_steps: 1
    ckpt:
      enable_checkpoint: true
      export_safetensors: false
    train_policy:
      mini_batch: 1
      grpo_optimization_iterations: 1
      kl_beta: 0.0
  rollout:
    n_generation: 2
    batch_size: 1
    prefetch_rollout: false
  logging:
    experiment_name: alpamayo_1_5_local_2gpu_smoke
