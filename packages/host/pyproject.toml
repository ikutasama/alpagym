[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name = "alpagym-host"
version = "0.1.0"
dependencies = [
  "alpagym-plugins",
  "alpasim-grpc",
  "grpcio",
  "hydra-core>=1.3.2",
  "pyyaml>=6.0.2",
  "tomli-w>=1.2.0",
]

[project.optional-dependencies]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
# Include the host package and the Hydra SearchPathPlugin namespace package.
# hydra_plugins/ is a namespace package (no __init__.py) that Hydra auto-discovers
# at startup, enabling automatic config search path registration from plugins.
include = ["alpagym_host*", "hydra_plugins*"]

[tool.setuptools.package-data]
"alpagym_host.conf" = ["**/*.yaml"]
