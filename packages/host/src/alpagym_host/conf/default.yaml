defaults:
  - config_schema
  - _self_
  - policy: alpamayo
  - reward: distance_to_gt
  # transport precedes topology so a topology preset can `override /transport`
  # (the distributed presets default to nccl); Hydra requires the overridden group
  # to appear earlier in the defaults list than the config that overrides it.
  - transport: disk
  - topology: ???
  - optional run: null
  - optional experiment: null
  # Override with deploy=slurm to submit a Slurm job, and provide the
  # site-specific partition/account/container image values as config overrides.
  - deploy: local

run_root: ./tmp/alpagym-runs

logging_level: INFO

# Optional root for deployment-owned writable caches.
cache_root_dir: null

execution:
  # The topology preset selects the backend (local_process or slurm); the deploy
  # preset fills the site settings (partition/account/image/caches) below.
  backend: ???
  # Set only when executing a run that was already prepared and written to disk.
  # Leave null for command=run to prepare a new run from this Hydra config.
  resolved_config_path: null
  slurm:
    job_name: alpagym
    partition: null
    account: null
    time: "02:00:00"
    nodes: 1
    gpus_per_node: 8
    exclusive: true
    cpus_per_task: 16
    # Set mem to "0" to request all memory on an allocated node.
    mem: null
    container_image: null
    container_cache_root: null
    # The host-side AlpaGym checkout path, mounted identically into the container
    # (the deploy preset mounts the filesystem that holds it). Cosmos runs
    # `uv sync --project` and launches from here.
    container_workdir: ${current_alpagym_project_root:}
    # Requeue ~2 min before the time limit and resume from checkpoint. Needs
    # cosmos.train.ckpt.enable_checkpoint.
    autoresume: false

# Per-episode step budget the trainer's packer pads every rollout to.
expected_valid_steps: 8

