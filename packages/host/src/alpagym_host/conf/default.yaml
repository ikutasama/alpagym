alpasim:
  # Set repo_path to use an existing checkout directly. When set, AlpaGym skips
  # clone/fetch/checkout/sync and starts Wizard from this path.
  repo_path: null
  # Optional directory for cached AlpaSim checkouts. Defaults to XDG_CACHE_HOME.
  checkout_cache_dir: null
  # repo_url and repo_ref are both derived from the single active `alpasim-grpc`
  # pin in the workspace pyproject.toml, so the Wizard runtime checkout and the
  # compiled `src/grpc/**` proto stubs are the same repo@rev. Set repo_path to
  # start Wizard from a local checkout instead of cloning.
  repo_url: ${alpasim_repo_url:}
  repo_ref: ${alpasim_grpc_repo_ref:}
  startup_timeout_s: 1200.0
  simulation_timeout_s: 600.0
  wizard_args:
    topology: 1gpu
    driver: null
    driver_source: external_dynamic
    force_gt_duration_us: 1_700_000
    control_timestep_us: 100_000
    # Derive n_sim_steps so each rollout yields expected_valid_steps closed-loop
    # policy steps: the policy runs only after the force-GT warmup, so
    # n_sim_steps = expected_valid_steps + warmup steps.
    n_sim_steps: "${add:${expected_valid_steps},${floordiv:${alpasim.wizard_args.force_gt_duration_us},${alpasim.wizard_args.control_timestep_us}}}"
    # Free-form sink for any other Hydra-style wizard overrides. Promote
    # anything we set unconditionally to a dedicated `wizard_args` field;
    # use this only for one-off / experimental tweaks.
    extra_overrides: ""

perf:
  enabled: false
  # reservoir sampling stride for timing
  sample_every_n: 1
  # null disables the periodic monitor
  resource_sample_interval_s: 5.0
  # per-series reservoir cap (percentiles)
  max_samples_per_series: 1000
  # count trigger for a background flush
  flush_every_n_updates: 1000
  # time trigger for a background flush
  flush_interval_s: 60.0
  collect_cpu: true
  collect_gpu: true

cosmos:
  mode: colocated
  launch:
    policy_replicas: 1
    rollout_replicas: 1
    controller_port: 29500
  train:
    train_batch_per_replica: 1
    max_num_steps: 1
    num_epochs: 1
    # AdamW learning rate (Cosmos-RL default: 1e-6).
    optm_lr: 1.0e-6
    # Linear warmup steps for the learning rate (Cosmos-RL default: 20).
    optm_warmup_steps: 20
    # Checkpoint settings. With `enable_checkpoint: true` the cosmos resume
    # bundle is written every `save_freq` steps and always on the last step;
    # with `export_safetensors: true` an HF-compatible weight set is also
    # written. Saves land under
    # `{run_dir}/cosmos/<timestamp>/{checkpoints,safetensors}/step_N/`
    # (cosmos appends `<timestamp>` to `train.output_dir` at startup).
    ckpt:
      enable_checkpoint: true
      save_freq: 20
      save_freq_in_epoch: 0
      export_safetensors: true
      max_keep: 5
    train_policy:
      allowed_outdated_steps: 4
      on_policy: false
      mini_batch: 1
      # PPO/GRPO ratio clipping. The trajectory probability ratio is clipped
      # to [1 - grpo_ratio_clip_low, 1 + grpo_ratio_clip_high].
      grpo_ratio_clip_low: 0.2
      grpo_ratio_clip_high: 0.2
      # Number of PPO/GRPO optimization passes over each collected rollout
      # group; total updates per group are this value * num_mini_batches.
      grpo_optimization_iterations: 1
      # Optional KL penalty against a reference model. 0 disables the penalty.
      kl_beta: 0.0
      # Trainer steps between reference-model refreshes when KL is enabled.
      # 0 means the reference model is not refreshed.
      reference_reset_interval: 0
  policy:
    parallelism:
      tp_size: 1
      cp_size: 1
      ep_size: 1
      dp_shard_size: 1
      pp_size: 1
      pp_micro_batch_size: 1
      dp_replicate_size: 1
  rollout:
    n_generation: 1
    batch_size: 1
    # Run cosmos-rl's _prefetch_loop so the streaming rollout backend can
    # start the next batch's simulate(1) calls before the current batch's
    # rollout_generation returns. Requires dp_shard_size == 1.
    prefetch_rollout: true
    parallelism:
      tp_size: 1
      pp_size: 1
  logging:
    # Add `wandb` to enable Weights & Biases logging.
    logger: [console]
    log_training_metrics_every_n_steps: 1
    project_name: alpagym
    experiment_name: alpagym_default_exp
