# @package _global_

defaults:
  - /execution/slurm/topology@execution.slurm.topology: separate_nodes
  # Disk transport avoids NCCL rollout artifact sends sharing R2R channels with
  # rollout-to-rollout weight sync while episode sends may still be in flight.
  - override /transport: disk
  - _self_

# Five 8-GPU nodes rebalanced toward AlpaSim: two Cosmos nodes shared by policy
# and rollout, plus three AlpaSim nodes. The preset moves one node from Cosmos
# to AlpaSim -- the per-node render bottleneck -- and lifts rollout dispatch
# depth (cosmos.rollout.batch_size) to drive the freed AlpaSim node.
#
# The five settings below are coupled; drop any one and the third AlpaSim node
# starves back to the 0.42 baseline:
#   - cosmos_nodes 2 / alpasim_nodes 3   reclaim one node for the render bottleneck
#   - rollout.batch_size 2     } together lift per-worker dispatch 4 -> 8 concurrent
#   - rollout.n_generation 2   }   sim sessions (sessions = batch_size * n_generation * prefetch)
#   - policy_replicas 4                  off-policy buffer C = 5*12*4 = 240 > 72 slots
#   - rollout_replicas 12                splits 4/4/4 evenly across the 3 AlpaSim runtimes
#
# These dispatch settings assume production multi-scene demand: set
# dataset.scene_ids or dataset.test_suite_id (e.g. public_2507). Validation fails
# if a later-composed preset resets the coupled batch/train geometry.

execution:
  backend: slurm
  slurm:
    nodes: 5
    qos: av_alpamayo_reasoning_high
    topology:
      cosmos_nodes: 2
      alpasim_nodes: 3

alpasim:
  wizard_args:
    topology: alpagym_8gpu
    extra_overrides: "+cameras=4cam_1080 runtime.simulation_config.control_timestep_us=200000 runtime.simulation_config.n_sim_steps=30 runtime.simulation_config.pose_reporting_interval_us=100000 runtime.simulation_config.force_gt_duration_us=1600000"

# n_sim_steps=30 with the 1.6s GT prefix emits 22 trainer replay rows. MR-2266
# trains those as step-level samples; mini_batch=1 keeps each forward memory-bounded.
expected_valid_steps: 22

cosmos:
  mode: disaggregated
  launch:
    policy_replicas: 4
    rollout_replicas: 12
  train:
    train_batch_per_replica: 12
    train_policy:
      mini_batch: 1
  policy:
    parallelism:
      dp_shard_size: 1
  rollout:
    batch_size: 2
    n_generation: 2
