# @package policy
kind: alpamayo

model:
  kind: ???
  path: ???
  device: cuda
  dtype: bfloat16
  use_cameras:
    - camera_front_wide_120fov
    - camera_front_tele_30fov
  input_size: [320, 512]
  num_context_frames: 2
  num_historical_waypoints: 16
  num_future_waypoints: 64
  step_dt_us: 100000

inference:
  max_batch_size: 4
  return_trace_for_rl: true
  sampling:
    top_p: 0.98
    top_k: null
    temperature: 0.6
    num_traj_samples: 1
    num_traj_sets: 1
    max_generation_length: null
    diffusion_kwargs:
      noise_level: null
      temperature: null
    # Seed stochastic sampling, run per-row forwards, and enable deterministic runtime settings.
    force_determinism: false

trajectory_selector: identity
